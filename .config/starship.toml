format = """
$directory\
$git_branch\
$git_state\
$git_status\
$fill\
$python\
$jobs\
$line_break\
$character"""

[fill]
symbol = " "

[directory]
style = "blue"
format = '[$path]($style) '
truncation_length = 7
truncation_symbol = "../"
truncate_to_repo = true

[character]
success_symbol = "[‚ùØ](#FC45FF)"
error_symbol = "[‚ùØ](red)"
vimcmd_symbol = "[‚ùØ](yellow)"

[git_branch]
format = "[$branch]($style)"
style = "bold white"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "‚Äã"
untracked = "‚Äã"
modified = "‚Äã"
staged = "‚Äã"
renamed = "‚Äã"
deleted = "‚Äã"
stashed = "‚â°"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[python]
style = "bold bright-yellow"
symbol = 'Óàµ '
format = '[${symbol}(\($virtualenv\) )]($style)'

[jobs]
symbol = 'ÔÄì '
style = 'red'
number_threshold = 1
format = "[$symbol$number]($style) "
